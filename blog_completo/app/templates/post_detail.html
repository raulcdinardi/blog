{% extends "base.html" %}

{% block content %}
<article class="article">
    <h2>{{ post.title }}</h2>
    {% if post.excerpt %}
        <p class="lead">{{ post.excerpt }}</p>
    {% endif %}
    <div class="article-body">{{ post.content | safe }}</div>
    {% if post.pdf_path %}
        <iframe class="pdf" src="{{ url_for('static', path=post.pdf_path) }}#view=FitH" title="{{ post.title }}"></iframe>
        <p><a href="{{ url_for('static', path=post.pdf_path) }}" target="_blank" rel="noopener noreferrer">Abrir PDF</a></p>
    {% endif %}
</article>
{% endblock %}
