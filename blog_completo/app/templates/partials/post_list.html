{% if posts %}
    {% for post in posts %}
        <article class="feed-item">
            <h2><a href="/posts/{{ post.id }}">{{ post.title }}</a></h2>
            <p>{{ post.excerpt }}</p>
        </article>
    {% endfor %}
    {% if page < pages %}
        <div
            class="load-more"
            hx-get="/posts?page={{ page + 1 }}"
            hx-trigger="revealed"
            hx-swap="outerHTML"
        >
            Carregando mais...
        </div>
    {% endif %}
{% else %}
    <div class="box">Nenhum post.</div>
{% endif %}
